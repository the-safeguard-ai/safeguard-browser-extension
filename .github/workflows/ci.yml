name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - name: Package MV3 zips (Chrome + Firefox)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          (cd dist && zip -r ../safeguard-chrome.zip .)
          (cd dist-firefox && zip -r ../safeguard-firefox.zip .)
      - name: Attach zips to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            safeguard-chrome.zip
            safeguard-firefox.zip

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (free CLI)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --exit-code 1
